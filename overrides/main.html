{% extends "base.html" %}

{% block extrahead %}
  {{ super() }}
  <style>
    html[data-md-color-scheme="default"] {
      background: #f5fbf8;
      color-scheme: light;
    }

    html[data-md-color-scheme="slate"] {
      background: #020807;
      color-scheme: dark;
    }
  </style>
  <script>
    (function () {
      var color = null;
      var applyColor = function (target, value) {
        if (!target || !value) {
          return;
        }

        target.setAttribute("data-md-color-scheme", value.scheme || "default");
        target.setAttribute("data-md-color-primary", value.primary || "teal");
        target.setAttribute("data-md-color-accent", value.accent || "teal");
      };
      var readColor = function (target) {
        if (!target) {
          return null;
        }

        return {
          scheme: target.getAttribute("data-md-color-scheme") || "default",
          primary: target.getAttribute("data-md-color-primary") || "teal",
          accent: target.getAttribute("data-md-color-accent") || "teal"
        };
      };
      var syncHtml = function (value) {
        applyColor(document.documentElement, value);
        document.documentElement.style.background = value.scheme === "slate" ? "#020807" : "#f5fbf8";
        document.documentElement.style.colorScheme = value.scheme === "slate" ? "dark" : "light";
      };

      try {
        for (var index = 0; index < localStorage.length; index += 1) {
          var key = localStorage.key(index);
          if (!key || !key.endsWith(".__palette")) {
            continue;
          }

          var value = JSON.parse(localStorage.getItem(key) || "{}");
          if (value && value.color) {
            color = value.color;
          }
        }
      } catch (error) {
        color = null;
      }

      if (!color) {
        color = window.matchMedia("(prefers-color-scheme: dark)").matches
          ? { scheme: "slate", primary: "teal", accent: "teal" }
          : { scheme: "default", primary: "teal", accent: "teal" };
      }

      if (color.media === "(prefers-color-scheme)") {
        color = window.matchMedia("(prefers-color-scheme: dark)").matches
          ? { scheme: "slate", primary: "teal", accent: "teal" }
          : { scheme: "default", primary: "teal", accent: "teal" };
      }

      syncHtml(color);

      document.addEventListener("DOMContentLoaded", function () {
        applyColor(document.body, color);
        syncHtml(readColor(document.body) || color);

        new MutationObserver(function () {
          syncHtml(readColor(document.body) || color);
        }).observe(document.body, {
          attributes: true,
          attributeFilter: [
            "data-md-color-scheme",
            "data-md-color-primary",
            "data-md-color-accent"
          ]
        });
      });
    })();
  </script>
{% endblock %}
