site_name: Dubbo Inherent Mesh for Kubernetes
site_url: https://kdubbo.github.io/
use_directory_urls: true

repo_name: dubbo-kubernetes
repo_url: https://github.com/apache/dubbo-kubernetes

theme:
  name: material
  language: zh
  custom_dir: overrides
  favicon: assets/static/logo.ico
  logo: assets/static/logo.png
  font: false
  palette:
    scheme: default
    primary: teal
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - admonition
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
  - attr_list
  - md_in_html

plugins:
  - search:
      lang: [en, zh]

extra_css:
  - assets/custom.css

extra_javascript:
  - assets/custom.js

nav:
  - 概述:
    - overview/index.md
  - 概念:
      - 流量管理: concepts/traffic-management.md
      - 安全: concepts/security.md
      - 可观察性: concepts/observability.md
  - 安装指南:
    - dubboctl: setup/install/dubboctl.md
    - helm: setup/install/helm.md
  - 嵌入程序: application/embed/index.md
  - 任务:
      - 流量管理:
           - 流量路由:
               - 权重: tasks/traffic/canary/canary.md
           - Ingress:
               - Kubernetes Gateway API: tasks/traffic/ingress/gateway-api.md
      - 安全:
          - 双向 TLS: tasks/security/mtls.md
      - 可观察性: tasks/observability/index.md
  - 运维（待补）: operation.md
  - 版本（待补）: latest/release/release.md
  - 参考（待补）: reference.md

copyright: Copyright © 2026 The ADK Team.